name: Unit Tests

on:
  workflow_call:

jobs:
  unit-tests-cuda:
    runs-on: reason
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create environment and install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          UV_TORCH_BACKEND=auto uv sync
          uv pip install transformers

      - name: Run pytest
        timeout-minutes: 20
        run: |
          export PYTHONPATH=$(pwd):$(pwd)/tests/unit_tests
          source .venv/bin/activate
          pytest tests/unit_tests

      - name: Run doctest
        timeout-minutes: 20
        run: |
          source .venv/bin/activate
          pytest --doctest-modules rlinf/scheduler

      - name: Clean up
        run: |
          rm -rf .venv
          uv cache prune

  unit-tests-cpu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create environment and install dependencies
        run: |
          pip install uv
          uv venv
          source .venv/bin/activate
          UV_TORCH_BACKEND=auto uv sync
          uv pip install transformers

      - name: Run pytest
        timeout-minutes: 20
        run: |
          export PYTHONPATH=$(pwd):$(pwd)/tests/unit_tests:$PYTHONPATH 
          source .venv/bin/activate
          pytest tests/unit_tests

  scheduler-unit-tests-rocm:
    runs-on: rocm
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create ROCm environment and install dependencies
        run: |
          unset UV_DEFAULT_INDEX
          export UV_PATH=/workspace/dataset/.uv
          export UV_CACHE_DIR=/workspace/dataset/.uv_cache
          export UV_PYTHON_INSTALL_DIR=/workspace/dataset/.uv_python
          bash requirements/install.sh --platform amd --no-flash-attn embodied --env dummy
          source .venv/bin/activate
          uv pip install transformers

      - name: Run scheduler unit tests
        timeout-minutes: 20
        run: |
          export PYTHONPATH=$(pwd):$(pwd)/tests/unit_tests:$PYTHONPATH
          source .venv/bin/activate
          pytest tests/unit_tests

      - name: Clean up
        run: |
          rm -rf .venv
          uv cache prune

  scheduler-unit-tests-ascend:
    runs-on: ascend
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create CANN environment and install dependencies
        run: |
          unset UV_DEFAULT_INDEX
          export UV_PATH=/workspace/dataset/.uv
          export UV_CACHE_DIR=/workspace/dataset/.uv_cache
          export UV_PYTHON_INSTALL_DIR=/workspace/dataset/.uv_python
          bash requirements/install.sh --platform ascend --no-flash-attn embodied --env dummy
          source .venv/bin/activate
          uv pip install transformers

      - name: Run scheduler unit tests
        timeout-minutes: 30
        run: |
          export PYTHONPATH=$(pwd):$(pwd)/tests/unit_tests:$PYTHONPATH
          source .venv/bin/activate
          for file in tests/unit_tests/test_*.py; do
              pytest "$file"
              ray stop
          done

      - name: Clean up
        run: |
          rm -rf .venv
          uv cache prune

  package-build-test:
    runs-on: embodied
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create environment and install dependencies
        shell: bash
        run: |
          uv venv
          source .venv/bin/activate
          uv build
          export WHL_FILE=$(ls $(pwd)/dist/rlinf-*.whl)
          cd
          unset UV_DEFAULT_INDEX
          export UV_PATH=/workspace/dataset/.uv
          export UV_LINK_MODE=symlink
          export UV_CACHE_DIR=/workspace/dataset/.uv_cache
          export UV_PYTHON_INSTALL_DIR=/workspace/dataset/.uv_python
          uv pip install $WHL_FILE[embodied]
          uv pip install $WHL_FILE[agentic-sglang]
          uv pip install $WHL_FILE[agentic-vllm]
          cd -

      - name: Check package import
        shell: bash
        timeout-minutes: 20
        run: |
          source .venv/bin/activate
          export PACKAGE_PATH=$(pwd)
          export PYTHONPATH=/workspace/dataset/Megatron-LM:$PYTHONPATH
          cd
          python $PACKAGE_PATH/tests/unit_tests/check_import_rlinf_package.py
          cd -
      
      - name: Clean up
        run: |
          rm -rf .venv
          uv cache prune

  package-structure-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check missing __init__.py under rlinf
        run: python tests/unit_tests/check_missing_init.py
