defaults:
  - env/embodichain_cart_pole@env.train
  - env/embodichain_cart_pole@env.eval
  - model/mlp_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/embodiment/config

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0

runner:
  task_type: embodied
  logger:
    log_path: /workspace/results/embodichain_ppo_cart_pole
    project_name: rlinf
    experiment_name: "ci-test"
    logger_backends: ["tensorboard"]

  max_epochs: 1
  max_steps: -1
  only_eval: False
  val_check_interval: -1
  save_interval: -1
  seq_length: 1
  max_prompt_length: 1
  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 2
  normalize_advantages: true
  kl_penalty: kl
  group_size: 1
  rollout_epoch: 1
  eval_rollout_epoch: 1
  reward_type: action_level
  logprob_type: action_level
  entropy_type: action_level
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: token-mean
  kl_beta: 0.0
  entropy_bonus: 0.0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 1.0
  huber_delta: 10.0
  gamma: 0.99
  gae_lambda: 0.95
  reward_coef: 1.0
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 0
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: 1
    max_length: 1
    min_length: 1

env:
  group_name: EnvGroup
  train:
    total_num_envs: 2
    group_size: ${algorithm.group_size}
    max_steps_per_rollout_epoch: 1
    max_episode_steps: 8
    reward_coef: ${algorithm.reward_coef}
    video_cfg:
      save_video: False
      info_on_video: False
      video_base_dir: ${runner.logger.log_path}/video/train
  eval:
    total_num_envs: 2
    group_size: ${algorithm.group_size}
    max_steps_per_rollout_epoch: 1
    max_episode_steps: 8
    is_eval: True
    reward_coef: ${algorithm.reward_coef}
    video_cfg:
      save_video: False
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: RolloutGroup
  backend: huggingface
  enable_offload: false
  pipeline_stage_num: 1
  model:
    model_path: ""
    precision: ${actor.model.precision}
  enable_torch_compile: False
  enable_cuda_graph: False

actor:
  group_name: ActorGroup
  training_backend: fsdp
  micro_batch_size: 1
  global_batch_size: 2
  seed: 1234
  enable_offload: false

  model:
    model_type: mlp_policy
    model_path: ""
    policy_setup: cartpole-delta-qpos
    obs_dim: 6
    action_dim: 2
    num_action_chunks: 1
    hidden_dim: 256
    precision: "32"
    add_value_head: true
    is_lora: false
    lora_rank: 32

  optim:
    lr: 1.0e-4
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    weight_decay: 0.0
    clip_grad: 0.5

  fsdp_config:
    strategy: fsdp
    sharding_strategy: no_shard
    gradient_checkpointing: false
    cpu_offload: false
    offload_pin_memory: false
    reshard_after_forward: true
    enable_gradient_accumulation: true
    forward_prefetch: false
    limit_all_gathers: false
    backward_prefetch: null
    use_orig_params: false
    use_liger_kernel: false
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}
    amp_autocast:
      enabled: false
      precision: "bf16"
    grad_scaler:
      enabled: false

reward:
  use_reward_model: False

critic:
  use_critic_model: False
