defaults:
  - env/libero_spatial@env.train
  - env/libero_spatial@env.eval
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/embodiment/config

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-1

runner:
  task_type: embodied
  logger:
    log_path: "../results/libero_spatial_dagger_openpi"
    project_name: rlinf
    experiment_name: "test_openpi_dagger"
    logger_backends: ["tensorboard"]

  max_epochs: 1
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: -1

algorithm:
  dagger:
    only_save_expert: False
    init_beta: 1.0
    beta_schedule: "exponential"
    beta_decay: 0.99

  rollout_epoch: 1
  eval_rollout_epoch: 1
  gamma: 0.99

  update_epoch: 1
  adv_type: gae
  loss_type: embodied_dagger

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

  replay_buffer:
    enable_cache: True
    cache_size: 8
    min_buffer_size: 1
    sample_window_size: 8
    auto_save: False

env:
  group_name: "EnvGroup"

  train:
    auto_reset: True
    ignore_terminations: True
    total_num_envs: 4
    max_episode_steps: 100
    max_steps_per_rollout_epoch: 100
  eval:
    total_num_envs: 1
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 100
    max_steps_per_rollout_epoch: 100
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    video_cfg:
      save_video: False
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1
  collect_prev_infos: False

  model:
    model_path: "/workspace/dataset/pi0_libero"
    precision: ${actor.model.precision}

  expert_model:
    model_path: "/workspace/dataset/pi0_libero"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 2
  global_batch_size: 4
  seed: 42
  enable_offload: False

  model:
    precision: null
    model_path: "/workspace/dataset/pi0_libero"
    num_action_chunks: 10
    add_value_head: False
    openpi:
      config_name: "pi0_libero"
      train_expert_only: False
      detach_critic_input: True
      action_chunk: ${actor.model.num_action_chunks}

  optim:
    lr: 1.0e-5
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1.0e-10
    clip_grad: 5.0
    lr_warmup_steps: 0
    total_training_steps: ${runner.max_epochs}

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
