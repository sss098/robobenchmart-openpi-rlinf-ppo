defaults:
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - _self_
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/sft/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "rbm_recap_lite_cfg_pi05"
    logger_backends: ["tensorboard"]

  max_epochs: -1
  max_steps: 2000
  val_check_interval: -1
  save_interval: 200
  resume_dir: null

data:
  num_workers: 4
  advantage_tag: rbm_recap_lite_sft_pos
  balance_dataset_weights: true
  episode_balanced: false
  positive_fraction: 0.5
  quota_cycle_size: null
  seed: 42

  train_data_paths:
    - dataset_path: "/root/autodl-tmp/lerobot_data/rbm_dataset"
      type: "sft"
      weight: 1.0

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 4
  global_batch_size: 16
  seed: 42
  enable_offload: false

  model:
    precision: null
    model_path: "/root/autodl-tmp/checkpoints/rbm_pi05_sft_pytorch"
    model_type: "cfg_model"
    num_action_chunks: 50
    action_dim: 13
    num_steps: 10
    add_value_head: false
    openpi:
      config_name: "pi05_rbm"
      num_images_in_input: 3
      action_chunk: 50
      action_env_dim: 13
      num_steps: 10
      cfgrl_guidance_scale: 1.0
      unconditional_prob: 0.3
      train_expert_only: true
      guidance_type: "positive"
      positive_only_conditional: false
      noise_method: "flow_noise"
      noise_params: [0.16, 0.12, 200]
      joint_logprob: true

  optim:
    lr: 5.0e-7
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-8
    weight_decay: 1.0e-10
    clip_grad: 1.0
    lr_scheduler: "cosine"
    lr_warmup_steps: 50
    total_training_steps: 2000
    min_lr: 0.0

  fsdp_config:
    strategy: "single"
    sharding_strategy: "no_shard"
    use_orig_params: false
    gradient_checkpointing: false
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: false

critic:
  use_critic_model: false
