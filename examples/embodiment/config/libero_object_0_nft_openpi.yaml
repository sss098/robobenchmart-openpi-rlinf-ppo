defaults:
  - env/libero_object@env.train
  - env/libero_object@env.eval
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_object_nft_openpi"
    logger_backends: ["tensorboard"]

  max_epochs: 100
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: -1

  resume_dir: null
  ckpt_path: null

algorithm:
  group_size: 8
  reward_coef: 1.0
  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level

  update_epoch: 2          
  adv_type: grpo
  loss_type: embodied_nft
  filter_rewards: True
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9

  # NFT-specific params
  nft_loss_form: mse         # dpo, mse
  nft_beta: 1.0              # velocity scaling coefficient
  adv_clip_max: 0.5          # advantage clipping bound for DPO preference signal
  dpo_beta: 1.0             # DPO loss temperature
  max_drift: 0.3            # max velocity drift norm for clipping
  nft_weight_mode: "auto"  # energy weight mode: "constant", "t", "sigma", "adaptive", "auto" (auto = adaptive for ODE, sigma for SDE)
  nft_weight_scale: [1.0, 0.2]   # weight scale 
  nft_target_space: "x0"  # xnext or x0
  nft_xcur_source: "resample"  # rollout or resample
  nft_tau: 1.0          # rollout lag policy EMA; 1.0 means on-policy
  recompute_v: False

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    task_id_filter: [0]
    total_num_envs: 64
    group_size: ${algorithm.group_size}
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
    video_cfg:
      save_video: False
      video_base_dir: ${runner.logger.log_path}/video/train
  eval:
    task_id_filter: [0]
    total_num_envs: 500
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    video_cfg:
      save_video: False
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: "/path/to/model/RLinf-Pi0-SFT-Spatial-Object-Goal"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 512
  seed: 42
  enable_offload: False

  model:
    model_path: "/path/to/model/RLinf-Pi0-SFT-Spatial-Object-Goal"
    num_action_chunks: 5 # interface for the env
    add_value_head: False
    openpi:
      is_nft: True
      noise_level: 0.0
      noise_method: "flow_ode"

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
