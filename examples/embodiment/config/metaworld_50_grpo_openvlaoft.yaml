defaults:
  - env/metaworld_50@env.train
  - env/metaworld_50@env.eval
  - model/openvla_oft@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "metaworld_grpo_openvla_final"
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1

  only_eval: False
  eval_policy_path: null
  val_check_interval: -1
  save_interval: 25
  seq_length: 4096
  max_prompt_length: 128

  resume_dir: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 8
  
  rollout_epoch: 16
  eval_rollout_epoch: 1

  reward_type: action_level
  logprob_type: token_level
  entropy_type: token_level

  adv_type: grpo
  loss_type: actor
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  reward_coef: 5.0

  sampling_params:
    do_sample: True
    temperature_train: 1.6
    temperature_eval: 0.6 
    top_k: -1
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

  filter_rewards: True
  rewards_lower_bound: 0.1
  rewards_upper_bound: 1.0

env:
  group_name: "EnvGroup"
  enable_offload: False

  train:
    total_num_envs: 64
    group_size: ${algorithm.group_size}
    max_episode_steps: 100
    max_steps_per_rollout_epoch: 100
    reward_coef: ${algorithm.reward_coef}

  eval:
    total_num_envs: 16
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 100
    max_steps_per_rollout_epoch: 100
    group_size: 1
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: "/path/to/model" # https://huggingface.co/RLinf/RLinf-OpenVLAOFT-Metaworld-SFT
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 12800
  seed: 1234
  enable_offload: False

  model:
    model_path: "/path/to/model" # https://huggingface.co/RLinf/RLinf-OpenVLAOFT-Metaworld-SFT
    model_type: "openvla_oft"
    num_action_chunks: 1
    unnorm_key: meta_world_strict

  optim:
    lr: 2.0e-5
    value_lr: 3.0e-3
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    clip_grad: 1.0

  fsdp_config:
    strategy: "fsdp"
    gradient_checkpointing: True
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False