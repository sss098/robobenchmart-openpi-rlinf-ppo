defaults:
  - env/maniskill_pick_cube@env.train
  - env/maniskill_pick_cube@env.eval
  - model/mlp_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-0
    env: 0-0
    rollout: 0-0
    reward: 0-0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "maniskill_ppo_mlp_qwentrend_gtsuccess_1000steps"
    logger_backends: ["tensorboard"]
  max_epochs: 1000
  max_steps: 1000
  only_eval: false
  val_check_interval: -1
  save_interval: -1
  resume_dir: null
  ckpt_path: null
  per_worker_log: false
  per_worker_log_path: null
  weight_sync_interval: 1

algorithm:
  update_epoch: 4
  normalize_advantages: true
  kl_penalty: kl
  group_size: 1
  rollout_epoch: 1
  eval_rollout_epoch: 1
  reward_type: action_level
  logprob_type: action_level
  entropy_type: action_level
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  bootstrap_type: always
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 1.0
  huber_delta: 10.0
  gamma: 0.99
  gae_lambda: 0.9
  sampling_params:
    do_sample: true
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 0
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

data:
  rollout_batch_size: 32

env:
  group_name: "EnvGroup"
  train:
    total_num_envs: 32
    auto_reset: true
    ignore_terminations: false
    use_fixed_reset_state_ids: false
    use_full_state: true
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50
    init_params:
      id: "PickCube3View-v1"
      obs_mode: "rgb"
      control_mode: "pd_joint_delta_pos"
      sim_backend: "gpu"
      sim_config:
        sim_freq: 100
        control_freq: 20
      sensor_configs:
        shader_pack: "minimal"
        width: 224
        height: 224
      human_render_camera_configs:
        shader_pack: "minimal"
        width: 224
        height: 224
      render_mode: all
    use_3rd_view_as_extra: true
  eval:
    total_num_envs: 32
    auto_reset: true
    ignore_terminations: true
    use_fixed_reset_state_ids: true
    group_size: 1
    use_full_state: true
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50
    init_params:
      id: "PickCube3View-v1"
      obs_mode: "rgb"
      control_mode: "pd_joint_delta_pos"
      sim_backend: "gpu"
      sim_config:
        sim_freq: 100
        control_freq: 20
      sensor_configs:
        shader_pack: "minimal"
        width: 224
        height: 224
      human_render_camera_configs:
        shader_pack: "minimal"
        width: 224
        height: 224
      render_mode: all
    use_3rd_view_as_extra: true
    video_cfg:
      save_video: true
      info_on_video: true
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: false
  pipeline_stage_num: 1
  model:
    model_path: ""
    precision: ${actor.model.precision}
  enable_torch_compile: true
  enable_cuda_graph: true

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1600
  global_batch_size: 1600
  seed: 1234
  enable_offload: false
  model:
    model_path: ""
    model_type: "mlp_policy"
    obs_dim: 42
  optim:
    lr: 1.0e-4
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 0.5
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: true
  group_name: "RewardGroup"
  reward_mode: history_buffer
  history_reward_assign: true
  reward_threshold: 0.5
  reward_weight: 1.0
  env_reward_weight: 0.0
  model:
    model_path: "/path/to/Qwen3-VL-4B-Instruct"
    model_type: "history_vlm"
    lora_path: "/path/to/qwen3-vl-lora-checkpoint"
    gt_success_bonus: 20.0
    precision: "bf16"
    input_builder_name: qwentrend_input_builder
    input_builder_params:
      default_task_description: "Pick up the red cube and place it on the green spot on the table."
    reward_parser_name: qwentrend_reward_parser
    reward_parser_params:
      positive_reward: 1.0
      negative_reward: -0.2
      unclear_reward: 0.0
      invalid_reward: 0.0
    inference_mode: generate
    history_buffers:
      history_window:
        history_size: 5
        min_history_size: 5
        input_interval: 1
        history_keys:
          - main_images
          - extra_view_images
        input_on_done: false
    interval_reward: 0.0
    enable_history_offload: true
    infer_micro_batch_size: 64
    subprocessor_kwargs:
      video_processor:
        do_sample_frames: true
    max_new_tokens: 16
    do_sample: false
    temperature: 0.0
    use_chat_template: true

critic:
  use_critic_model: false
