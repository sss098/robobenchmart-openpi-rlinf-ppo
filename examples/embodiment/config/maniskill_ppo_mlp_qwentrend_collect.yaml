defaults:
  - env/maniskill_pick_cube@env.train
  - env/maniskill_pick_cube@env.eval
  - model/mlp_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-0
    env: 0-0
    rollout: 0-0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "collct_dual_view_300steps_save100"
    logger_backends: ["tensorboard"]
  max_epochs: 300
  max_steps: 300
  only_eval: false
  eval_policy_path: null
  val_check_interval: 10
  save_interval: 100
  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 8
  normalize_advantages: true
  kl_penalty: kl
  group_size: 1
  rollout_epoch: 1
  eval_rollout_epoch: 1
  reward_type: action_level
  logprob_type: action_level
  entropy_type: action_level
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  bootstrap_type: always
  kl_beta: 0.0
  entropy_bonus: 0.0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 1.0
  huber_delta: 10.0
  gamma: 0.8
  gae_lambda: 0.9
  sampling_params:
    do_sample: true
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 0
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  train:
    env_type: maniskill
    total_num_envs: 1024
    wrap_obs_mode: simple
    use_full_state: false
    auto_reset: true
    ignore_terminations: false
    use_rel_reward: false
    reward_mode: raw
    seed: 0
    group_size: 1
    use_fixed_reset_state_ids: false
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50
    video_cfg:
      save_video: false
      info_on_video: true
      video_base_dir: ${runner.logger.log_path}/video/train
    enable_offload: false
    init_params:
      id: "PickCube3View-v1"
      num_envs: null
      obs_mode: "state"
      control_mode: "pd_joint_delta_pos"
      sim_backend: "gpu"
      sim_config:
        sim_freq: 100
        control_freq: 20
      max_episode_steps: 50
      sensor_configs:
        shader_pack: "minimal"
      render_mode: all
    is_eval: false
    data_collection:
      enabled: false
  eval:
    env_type: maniskill
    total_num_envs: 256
    wrap_obs_mode: simple
    use_full_state: true
    auto_reset: true
    ignore_terminations: false
    use_rel_reward: false
    reward_mode: raw
    seed: 0
    group_size: 1
    use_fixed_reset_state_ids: false
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50
    video_cfg:
      save_video: false
      info_on_video: true
      video_base_dir: ${runner.logger.log_path}/video/eval
    enable_offload: false
    init_params:
      id: "PickCube3View-v1"
      num_envs: null
      obs_mode: "rgb"
      control_mode: "pd_joint_delta_pos"
      sim_backend: "gpu"
      sim_config:
        sim_freq: 100
        control_freq: 20
      max_episode_steps: 50
      sensor_configs:
        shader_pack: "minimal"
        width: 224
        height: 224
      render_mode: rgb_array
    use_3rd_view_as_extra: true
    is_eval: true
    data_collection:
      enabled: true
      save_dir: ${runner.logger.log_path}/collected_data
      export_format: pickle
      only_success: false
      gae_gamma: 0.8
      gae_lambda: 0.9
      collect_env_stride: 1
      sidecar_rgb_capture: false

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: false
  pipeline_stage_num: 1
  model:
    model_path: ""
    precision: "32"
  enable_torch_compile: true
  enable_cuda_graph: true

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 800
  global_batch_size: 6400
  seed: 1234
  enable_offload: false
  optim:
    lr: 0.0003
    value_lr: 0.0003
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 0.5
  fsdp_config:
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: false

critic:
  use_critic_model: false
