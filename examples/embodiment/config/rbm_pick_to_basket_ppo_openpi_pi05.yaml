defaults:
  - env/robobenchmart_pick_to_basket_train3@env.train
  - env/robobenchmart_pick_to_basket_train3@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - _self_
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: rbm_pick_to_basket_ppo_openpi_pi05_smoke
    logger_backends: ["tensorboard"]

  max_epochs: 2
  max_steps: -1
  only_eval: False
  val_check_interval: -1
  save_interval: 1
  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: low_var_kl
  group_size: 1
  reward_coef: 1.0
  rollout_epoch: 4
  eval_rollout_epoch: 1
  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: chunk_level
  update_epoch: 1
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: token-mean
  bootstrap_type: none
  kl_beta: 0.1
  ref_kl_target: 0.01
  # Refuse unsafe actor updates: a failed-only rollout contains no success signal,
  # and the initial reference/current policy KL must be numerically zero.
  actor_update_min_successes: 2
  success_reward_threshold: 4.5
  ref_kl_zero_tolerance: 0.02
  kl_beta_min: 1.0e-4
  kl_beta_max: 10.0
  kl_beta_adaptation_rate: 1.5
  entropy_bonus: 0.0
  clip_ratio_high: 0.1
  clip_ratio_low: 0.1
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0
  gamma: 0.99
  gae_lambda: 0.95
  filter_rewards: False
  rewards_lower_bound: 0.0
  rewards_upper_bound: 1.0
  sampling_params:
    do_sample: True
    temperature_train: 0.8
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: EnvGroup
  train:
    # Match the validated evaluation physics path: one CPU env per task/stage.
    total_num_envs: 3
    reward_mode: rbm_shaped
    episode_seed_start: null
    episode_seed_lists:
      - [4, 8, 12, 16, 20, 24, 28, 32, 36, 40, 44, 52, 56, 72, 76, 80, 88, 96, 100, 104, 108, 116, 120, 124, 128, 132, 136, 140, 148, 152]
      - [0, 4, 8, 12, 20, 24, 32, 36, 40, 44, 48, 52, 56, 60, 64, 72, 80, 84, 88, 92, 96, 100, 108, 116, 120, 124, 128, 132, 136, 140]
      - [0, 4, 8, 16, 20, 28, 36, 40, 48, 60, 68, 76, 84, 88, 92, 96, 104, 108, 116, 120, 124, 128, 132, 136, 140, 144, 152, 156, 160, 168]
    auto_reset: False
    ignore_terminations: False
    max_steps_per_rollout_epoch: 600
    max_episode_steps: 600
    init_params:
      sim_backend: cpu
  eval:
    total_num_envs: 12
    reward_mode: only_success
    episode_seed_start: null
    episode_seed_lists:
      - [4, 8, 12, 16, 20, 24, 28, 32, 36, 40, 44, 52, 56, 72, 76, 80, 88, 96, 100, 104, 108, 116, 120, 124, 128, 132, 136, 140, 148, 152]
      - [0, 4, 8, 12, 20, 24, 32, 36, 40, 44, 48, 52, 56, 60, 64, 72, 80, 84, 88, 92, 96, 100, 108, 116, 120, 124, 128, 132, 136, 140]
      - [0, 4, 8, 16, 20, 28, 36, 40, 48, 60, 68, 76, 84, 88, 92, 96, 104, 108, 116, 120, 124, 128, 132, 136, 140, 144, 152, 156, 160, 168]
    robot_init_pose_start_seed: null
    auto_reset: True
    ignore_terminations: True
    max_steps_per_rollout_epoch: 40
    max_episode_steps: 600
    group_size: 1
    is_eval: True
    video_cfg:
      save_video: False
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: RolloutGroup
  seed: 42
  generation_backend: huggingface
  recompute_logprobs: False
  unnorm_key: rbm_dataset
  # The rollout copy is only needed during generation. Keeping it on GPU while
  # the actor runs PPO + SFT exceeds a 96 GB card on the first policy update.
  enable_offload: True
  pipeline_stage_num: 3
  model:
    model_path: ${oc.env:MODEL_PATH,/path/to/rbm_pi05_sft_pytorch}
    precision: ${actor.model.precision}

actor:
  group_name: ActorGroup
  training_backend: fsdp
  micro_batch_size: 1
  # Each rollout epoch produces 3 * (600 / 50) = 36 chunk samples.
  global_batch_size: 12
  seed: 42
  enable_offload: False
  config_name: ${actor.model.openpi.config_name}
  enable_sft_co_train: True
  # Batch size is tied to actor.micro_batch_size in the worker. Keep checkpointing
  # off unless a future model variant still needs the extra activation savings.
  sft_gradient_checkpointing: False
  sft_data_path: /root/autodl-tmp/lerobot_data
  sft_loss_weight: 1.0
  model:
    model_path: ${oc.env:MODEL_PATH,/path/to/rbm_pi05_sft_pytorch}
    model_type: openpi
    action_dim: 13
    num_action_chunks: 50
    num_steps: 10
    add_value_head: True
    policy_setup: robobenchmart
    openpi:
      config_name: pi05_rbm
      num_images_in_input: 3
      action_chunk: ${actor.model.num_action_chunks}
      action_env_dim: ${actor.model.action_dim}
      num_steps: ${actor.model.num_steps}
      add_value_head: ${actor.model.add_value_head}
      value_after_vlm: True
      value_vlm_mode: mean_token
      noise_method: flow_noise
      noise_params: [0.16, 0.12, 200]
      # joint_logprob=True injects flow noise at all 10 denoising steps in train
      # while eval uses ODE at all steps; that exploration policy scored 0/12 and
      # 1/12. Use one randomly selected noisy denoising step instead.
      joint_logprob: False
      train_expert_only: True
  optim:
    lr: 5.0e-8
    value_lr: 1.0e-5
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-8
    weight_decay: 0.01
    clip_grad: 1.0
    # Four episodes/task produce 144 chunks: one full 12-update runner epoch
    # warms the value head before any policy update.
    critic_warmup_steps: 12
    total_training_steps: 200
    min_lr_rate: 0.1
    lr_scheduler: cosine
  fsdp_config:
    strategy: fsdp
    sharding_strategy: no_shard
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
